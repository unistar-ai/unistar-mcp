name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: "ghcr.io"
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  image-build:
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: false
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Lint
        uses: golangci/golangci-lint-action@v9
      - name: Verify
        run: |
          make verify
      - name: Test
        run: |
          make test
      - name: Release Binary
        env:
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose
      - name: Prepare Tag ENV
        shell: bash
        run: |-
          REPOSITORY=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          echo "REPOSITORY=$REPOSITORY" >> $GITHUB_ENV
      - name: Image Build and Release
        uses: docker/build-push-action@v6
        with:
          push: false
          build-args: |
            TAG=ghcr.io/${{ env.REPOSITORY }}/unistar-mcp:latest,ghcr.io/${{ env.REPOSITORY }}/unistar-mcp:${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          tags: ghcr.io/${{ env.REPOSITORY }}/unistar-mcp:latest,ghcr.io/${{ env.REPOSITORY }}/unistar-mcp:${{ github.ref_name }}
          platforms: "linux/amd64,linux/arm64"
          file: package/Dockerfile
          sbom: true
          provenance: mode=max
